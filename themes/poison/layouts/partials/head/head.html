<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" {{with .Site.LanguageCode}} xml:lang="{{.}}" lang="{{.}}" {{end}}>

<head>
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self' http://localhost:1313 https://actionnetwork.org;

    script-src
      'self'
      'sha256-ZiuPtBZ6iITY6c2DZ+mW9BdPe90BamyQeRQy+nmG0dg='
      'sha256-1m9w//ExwjhDyEJYoh8g1cQ5qSuRjQUm255WuE5LXlo='
      https://actionnetwork.org
      https://cdn.jsdelivr.net;

    style-src
      'self'
      'unsafe-inline'
      https://actionnetwork.org
      https://cdn.jsdelivr.net;

    font-src 'self' data:;

    img-src
      'self'
      https:
      data:
      blob:;

    object-src 'none';
    base-uri 'self';
  ">
  {{ partial "head/scripts.html" . }}

  <!-- Content Type -->
  <meta http-equiv="content-type" content="text/html; charset=utf-8">

  <!-- Enable responsiveness on mobile devices-->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- favicon -->
  <link rel="icon" href={{ .Site.Params.favicon | default "/favicon.png" }}>

  <!-- CSS stylesheets -->
  {{ partial "head/stylesheets.html" . }}

  <!-- Custom style tag for parameterized CSS -->
  {{ partial "head/css.html" . }}
</head>
